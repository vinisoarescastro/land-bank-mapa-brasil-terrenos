<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LandBank: Brasil Terrenos</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="./favicon_io/favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="./logo_brasil_terrenos.png" alt="Logo" class="sidebar-logo">
      <div class="title-group">
        <h1>Land Bank</h1>
        <div class="subtitle">Banco de Terrenos</div>
      </div>
      <button class="sidebar-toggle" id="sidebarClose" aria-label="Fechar menu">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="last-updated-bar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none"
          stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="8" cy="3" rx="5" ry="2"/>
        <path d="M3 3v10c0 1.1 2.2 2 5 2s5-.9 5-2V3"/>
        <path d="M3 8c0 1.1 2.2 2 5 2s5-.9 5-2"/>
      </svg>

      <span id="lastUpdatedDate">-</span>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="search-box">
      <div class="search-input-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Buscar terreno, cidade ou regional…">
      </div>
    </div>

    <div class="filters-row">
      <div class="filters">
        <h3>Status</h3>
        <div id="filterStatus"></div>
      </div>

      <div class="filters">
        <h3>Ano Previsto</h3>
        <div id="filterYear"></div>
      </div>

    </div>

    <div class="filters" style="border-bottom: 1px solid var(--sb-border3);">
      <h3>Localização</h3>
      <div id="filterLocalizacao"></div>
    </div>

    <!-- Banner de filtros ativos -->
    <div class="filter-notice" id="filterNotice">
      <span>Filtros ativos - exibindo apenas os dados correspondentes.</span>
      <button id="clearFiltersBtn">Limpar filtros</button>
    </div>

    <div class="counter" id="counter"></div>
    <div class="list-container" id="listContainer"></div>
  </div>

  <!-- Map area -->
  <div class="map-wrap">
    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" id="mobileMenuBtn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Terrenos
    </button>

    <!-- Layer control panel -->
    <div class="layer-panel" id="layerPanel">
      <div class="layer-panel-header" id="layerToggle">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Camadas
        <span id="chevron">&#9660;</span>
      </div>
      <div class="layer-panel-body" id="layerBody">
        <label class="layer-option">
          <input type="checkbox" id="layerStreets">
          <span class="layer-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7z"/><path d="M9 4v13M15 7v13"/>
            </svg>
          </span>
          <div>Mapa Base (Ruas)</div>
        </label>
        <label class="layer-option">
          <input type="checkbox" id="layerSatellite" checked>
          <span class="layer-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </span>
          <div>Satélite</div>
        </label>
        <label class="layer-option">
          <input type="checkbox" id="layerTerrain">
          <span class="layer-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 20l4.5-9 4.5 5 3.5-5 5 9H3z"/>
            </svg>
          </span>
          <div>Relevo / Topografia</div>
        </label>
        <label class="layer-option">
          <input type="checkbox" id="layerVegetation">
          <span class="layer-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22V12"/><path d="M12 12C12 12 7 9 7 5a5 5 0 0 1 10 0c0 4-5 7-5 7z"/><path d="M12 16c0 0-4-2-4-5"/><path d="M12 16c0 0 4-2 4-5"/>
            </svg>
          </span>
          <div>Cobertura Vegetal</div>
        </label>
      </div>
    </div>

    <div id="map"></div>

    <!-- Banner de manutenção -->
    <div class="manutencao-banner" id="manutencaoBanner">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      <span><strong>Plataforma em manutenção.</strong><br>Algumas funcionalidades podem apresentar instabilidades temporárias.</span>
      <button class="manutencao-close" id="manutencaoClose" disabled aria-label="Fechar aviso">
        <span class="manutencao-countdown" id="manutencaoCountdown">30</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="map-footer">
      <span>Centro de Inteligência e Dados</span>
      <span class="map-footer-dot">·</span>
      <span>v1.4.0</span>
      <span class="map-footer-dot">·</span>
      <a href="mailto:controladoria@btsa.com.br">Reportar divergência</a>
    </div>
  </div>

  <!-- Scripts: data first, then app logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
